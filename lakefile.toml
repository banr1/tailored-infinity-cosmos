name = "InfinityCosmos"
defaultTargets = ["InfinityCosmos"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "LeanArchitect"
scope = "hanwenzhu"
rev = "v4.26.0"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "ef921c9a5139539a505bc3291f1a076a1e250d92"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "lean-atlas"
path = "../lean-atlas"

[[lean_lib]]
name = "InfinityCosmos"
